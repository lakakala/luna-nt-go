syntax = "proto3";

option go_package = "./pb";

message BaseResp {
  optional int32  code = 1;
  optional string msg  = 2;
}

message AuthReq {
  optional string token     = 1;
  optional int64  timestamp = 2;
  optional uint64 client_id = 3;
}

message AuthResp {
  optional BaseResp base_resp = 1;
}

message ConnectReq {
  optional uint64 channel_id  = 1;
  optional string addr        = 2;
}

message ConnectResp {
  optional BaseResp base_resp = 1;
}

message ClientCloseReq {
  
}

message ClientCloseResp {
  optional BaseResp base_resp = 1;
}

message ChannelCreateReq {
  optional uint64 channel_id  = 1;
  optional uint64 window_size = 3;
}

message ChannelCreateResp {
  optional BaseResp base_resp = 1;
}

message ChannelCloseNoti {
  optional uint64 channel_id = 1;
  optional string msg = 2;
}

message DataNoti {
  optional uint64 channel_id = 1;
  optional uint32 code = 2;
  optional bytes  data       = 3;
}

message ChannelWindowUpdateNoti {
  optional uint64 channel_id = 1;
  optional uint32 code = 2;
  optional uint64 window_size = 3;
}
