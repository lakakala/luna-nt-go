syntax = "proto3";

option go_package = "./pb";

message BaseResp {
  optional int32  code = 1;
  optional string msg  = 2;
}

message AuthReq {
  optional string token     = 1;
  optional int64  timestamp = 2;
  optional uint64 client_id = 3;
}

message AuthResp {
  optional BaseResp base_resp = 1;
}

message ConnectReq {
  optional uint64 channel_id  = 1;
  optional string addr        = 2;
  optional uint64 window_size = 3;
  optional uint64 batch_size = 4;
}

message ConnectResp {
  optional BaseResp base_resp = 1;
}

message DataNoti {
  optional uint64 channel_id = 1;
  optional bytes  data       = 2;
}

message CloseChannelReq {
  optional uint64 channel_id = 1;
  optional string msg = 2;
}

message CloseChannelResp {
  optional BaseResp base_resp = 1;
}

message CloseChannelReadHalfReq {
  optional uint64 channel_id = 1;
}

message CloseChannelReadHalfResp {
  optional BaseResp base_resp = 1;
}

message CloseChannelWriteHalfReq {
  optional uint64 channel_id = 1;
}

message CloseChannelWriteHalfResp {
  optional BaseResp base_resp = 1;
}

message ChannelWindowUpdateNoti {
  optional uint64 channel_id = 1;
  optional uint64 window_size = 2;
}